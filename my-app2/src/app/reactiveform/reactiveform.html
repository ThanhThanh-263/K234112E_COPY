<form [formGroup]="regForm" class="register-form">
  <h3 class="title">{{ 'Đăng ký khóa học' | uppercase }}</h3>

  <!-- TÊN -->
  <div class="mb-3">
    <label for="name">Tên:</label>
    <input
      type="text"
      id="name"
      class="form-control"
      placeholder="Nhập tên"
      formControlName="name"
    />
  </div>

  <!-- EMAIL -->
  <div class="mb-3">
    <label for="email">Email:</label>
    <input
      type="email"
      id="email"
      class="form-control"
      placeholder="Nhập email"
      formControlName="email"
    />
  </div>

  <!-- MẬT KHẨU -->
  <div class="mb-3">
    <label for="password">Mật khẩu:</label>
    <input
      type="password"
      id="password"
      class="form-control"
      formControlName="password"
    />
  </div>

  <!-- NHẬP LẠI MẬT KHẨU -->
  <div class="mb-3">
    <label for="confirm">Nhập lại mật khẩu:</label>
    <input
      type="password"
      id="confirm"
      class="form-control"
      formControlName="confirmPass"
    />
  </div>

  <!-- BUTTON -->
  <div class="text-end">
    <button
      type="submit"
      class="btn btn-primary me-2"
      [disabled]="regForm.invalid"
    >
      Đăng ký
    </button>

    <button
      type="button"
      class="btn btn-secondary"
      (click)="setDefaultValues()"
    >
      Default values
    </button>
  </div>
</form>
